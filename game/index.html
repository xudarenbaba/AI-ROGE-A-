<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>AI Roguelite 网页演示</title>
    <link rel="stylesheet" href="styles.css?v=skill1" />
  </head>
  <body>
    <div class="layout">
      <section class="game-panel">
        <div class="lore-banner">
          <h1>《无间行录》：十八狱镇压行动</h1>
          <p>
            你是“阳差未绝”的魂体，坠入失序阴司。清怪开门、择狱印；
            <strong>第2间为裂狱并行</strong>（左右分场，两边清完才开门）。
            对话改乌枭姿态（守护/突击）。主动技能装在技能槽，按 <strong>1</strong> 释放（默认契印连携：贴枭攒条后齐攻）。
          </p>
        </div>
        <div class="canvas-wrap">
          <canvas id="gameCanvas" width="960" height="540"></canvas>
          <div id="blessingOverlay" class="blessing-overlay hidden">
            <h3>选择狱印</h3>
            <p class="blessing-hint">魂体印强化你 · 鬼差印强化乌枭 · 契约印强化配合 · 可重复叠层</p>
            <div id="blessingChoices" class="blessing-choices"></div>
          </div>
        </div>
        <div class="hud">
          <div id="hudStats"></div>
          <p class="tips">
            移动：WASD | 射击：空格 | 闪避：Shift | 技能：1 | 姿态对话：守护/突击 | 清房后靠右门
          </p>
        </div>
      </section>

      <aside class="stats-column" aria-label="角色属性">
        <div id="playerStatsPanel" class="stat-panel stat-panel--soul"></div>
        <div id="allyStatsPanel" class="stat-panel stat-panel--ally"></div>
        <div id="pactStatsPanel" class="stat-panel stat-panel--pact hidden"></div>
      </aside>

      <aside class="chat-column">
        <h2>鬼差同盟 · 乌枭</h2>
        <div id="chatLog" class="chat-log"></div>
        <form id="chatForm">
          <input id="chatInput" autocomplete="off" maxlength="160" placeholder="姿态：守护我 / 突击..." />
          <button type="submit">发送</button>
        </form>
      </aside>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.3/dist/ort.min.js"></script>
    <script src="pathfinding.js?v=skill1"></script>
    <script src="obstacles/layouts.js?v=skill1"></script>
    <script src="dungeon/roomLayouts.js?v=skill1"></script>
    <script src="dungeon/generator.js?v=skill1"></script>
    <script src="dungeon/minimap.js?v=skill1"></script>
    <script src="dungeon/doorTransition.js?v=skill1"></script>
    <script src="combat/shooting.js?v=skill1"></script>
    <script src="combat/hazards.js?v=skill1"></script>
    <script src="enemies/eliteRegistry.js?v=skill1"></script>
    <script src="enemies/abilities.js?v=skill1"></script>
    <script src="bosses/registry.js?v=skill1"></script>
    <script src="bosses/patterns.js?v=skill1"></script>
    <script src="fx.js?v=skill1"></script>
    <script src="bullets/patterns.js?v=skill1"></script>
    <script src="meta/blessings.js?v=skill1"></script>
    <script src="coop/coop.js?v=skill1"></script>
    <script src="skills/registry.js?v=skill1"></script>
    <script src="game.js?v=skill1"></script>
  </body>
</html>
